<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    
    <title>Matrix 3D Mainframe</title>
    <style>
        body { 
            margin: 0; background: #000; height: 100vh; overflow: hidden; 
            font-family: 'Courier New', monospace; touch-action: none; 
            overscroll-behavior: none; 
        }
        
        #app-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        
        #matrix-canvas { flex: 0 0 40vh; display: block; background: #000; }
        
        #menu-ui { 
            flex: 1; background: #050505; display: flex; flex-direction: column; 
            padding: 20px; gap: 20px; border-top: 4px ridge #0f0; color: #fff;
        }

        #ad-container { 
            width: 100%; 
            min-height: 200px; 
            border: 1px dashed #333; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin-bottom: 10px;
            overflow: hidden;
        }

        .control-row { 
            display: flex; align-items: center; justify-content: space-between; 
            gap: 20px; margin-top: auto; flex-wrap: wrap;
        }
        
        .color-selector { display: flex; gap: 10px; }
        .color-btn { 
            padding: 10px 15px; border: 2px solid #333; cursor: pointer; 
            opacity: 0.3; font-weight: bold; transition: 0.2s;
        }
        .color-btn.active { opacity: 1; border-color: #fff; }

        #speed-slider { width: 100px; cursor: pointer; }

        #engage-btn { 
            background: #0f0; color: #000; padding: 10px 20px; 
            font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer;
        }

        .screensaver-mode #menu-ui { display: none; }
        .screensaver-mode #matrix-canvas { flex: 0 0 100vh; }

        #screensaver-close {
            display: none; position: fixed; bottom: 20px; right: 20px;
            padding: 10px 15px; background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2); color: #fff;
            font-size: 14px; cursor: pointer; z-index: 9999;
            border-radius: 4px; user-select: none;
        }
        .screensaver-mode #screensaver-close { display: block; }
    </style>
</head>
<body id="app-body">

<div id="app-container">
    <canvas id="matrix-canvas"></canvas>
    <div id="menu-ui">
        <div id="ad-container">
            <div id="frame" style="width: 200px;margin: auto;z-index: 99998;height: auto">
                <iframe data-aa='2445356' src='//ad.a-ads.com/2445356/?size=200x200'
                        style='border:0; padding:0; width:200px; height:200px; overflow:hidden;display: block;margin: auto'></iframe>
            </div>
            </div>
        <div class="control-row">
            <div class="color-selector">
                <div class="color-btn active" data-color="#0f0" style="background:#0f0; color:#000;">G</div>
                <div class="color-btn active" data-color="#00f2ff" style="background:#00f2ff; color:#000;">B</div>
                <div class="color-btn active" data-color="#ff0000" style="background:#ff0000; color:#000;">R</div>
            </div>
            <input type="range" id="speed-slider" min="0.5" max="3" step="0.1" value="1">
            <div id="engage-btn">Full Animation</div>
        </div>
    </div>
</div>

<div id="screensaver-close">RETURN</div>

<script>
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    const body = document.getElementById('app-body');
    const engageBtn = document.getElementById('engage-btn');
    const speedSlider = document.getElementById('speed-slider');
    
    let activeColors = ['#0f0', '#00f2ff', '#ff0000'];
    let speedMultiplier = 1;
    
    speedSlider.addEventListener('input', (e) => speedMultiplier = parseFloat(e.target.value));

    document.getElementById('screensaver-close').addEventListener('click', () => {
        if (document.fullscreenElement) document.exitFullscreen();
        body.classList.remove('screensaver-mode');
        resize();
    });

    const chars = '0123456789ァアィイゥウェエォオカガキギクグケゲコゴサザシジスズセゼソゾタダチヂッツヅテデトドナニヌネノハバパヒビピフブプヘベペホボポマミムメモャヤュユョヨラリルレロヮワヰヱヲンヴヵヶ'.split('');
    const fov = 350;
    const maxZ = 2000;
    let streams = [];

    document.querySelectorAll('.color-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const color = btn.dataset.color;
            if (activeColors.includes(color)) {
                if (activeColors.length > 1) {
                    activeColors = activeColors.filter(c => c !== color);
                    btn.classList.remove('active');
                }
            } else {
                activeColors.push(color);
                btn.classList.add('active');
            }
        });
    });

    class Stream {
        constructor() { this.reset(true); }
        reset(randomizeZ) {
            this.z = randomizeZ ? Math.random() * maxZ + 10 : maxZ;
            let angle = Math.random() * Math.PI * 2;
            let radius = Math.random() * 1000 + 200;
            this.x = Math.cos(angle) * radius;
            this.y = -500;
            this.speedY = Math.random() * 4 + 2;
            this.speedZ = Math.random() * 4 + 2;
            this.length = Math.floor(Math.random() * 10 + 5);
            this.charsArr = Array(this.length).fill('');
            this.updateChars();
            this.color = activeColors[Math.floor(Math.random() * activeColors.length)];
        }
        updateChars() {
            for(let i=0; i<this.length; i++) this.charsArr[i] = chars[Math.floor(Math.random() * chars.length)];
        }
        draw() {
            this.y += this.speedY * speedMultiplier;
            this.z -= this.speedZ * speedMultiplier;
            if (Math.random() > 0.95) this.updateChars();
            if (this.y > 2000) this.y = -500;
            if (this.z < 10) { 
                this.reset(false); 
                this.color = activeColors[Math.floor(Math.random() * activeColors.length)]; 
            }
            
            let scale = fov / this.z;
            let screenX = this.x * scale + canvas.width / 2;
            let fontSize = 20 * scale;
            
            ctx.font = `bold ${fontSize}px 'Courier New', monospace`;
            for (let i = 0; i < this.length; i++) {
                let charY = this.y - (i * 35); 
                let screenY = charY * scale + canvas.height / 2;
                let alpha = (1 - (i / this.length)) * (1 - (this.z / maxZ));
                ctx.globalAlpha = Math.max(0, alpha);
                ctx.fillStyle = (i === 0) ? '#FFF' : this.color;
                ctx.fillText(this.charsArr[i], screenX, screenY);
            }
        }
    }

    engageBtn.addEventListener('click', () => {
        body.classList.add('screensaver-mode');
        resize();
        if (canvas.requestFullscreen) canvas.requestFullscreen();
    });

    document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement) {
            body.classList.remove('screensaver-mode');
            resize();
        }
    });

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = body.classList.contains('screensaver-mode') ? window.innerHeight : window.innerHeight * 0.4;
    }

    function loop() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        streams.forEach(s => s.draw());
        ctx.globalAlpha = 1.0;
        requestAnimationFrame(loop);
    }

    streams = Array.from({length: 150}, () => new Stream());
    window.addEventListener('resize', resize);
    resize();
    loop();
</script>
</body>
</html>
