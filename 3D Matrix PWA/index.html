<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    
    <title>Matrix 3D Mainframe</title>
    <style>
        /* Touch and Overscroll prevention for PWA feel */
        body { 
            margin: 0; background: #000; height: 100vh; overflow: hidden; 
            font-family: 'Courier New', monospace; touch-action: none; 
            overscroll-behavior: none; 
        }
        
        #app-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        
        #matrix-canvas { flex: 0 0 50vh; display: block; background: #000; }
        
        #menu-ui { 
            flex: 1; background: #050505; display: flex; flex-direction: column; 
            padding: 20px; gap: 20px; border-top: 4px ridge #0f0; color: #fff;
        }

        .control-row { display: flex; align-items: center; justify-content: space-between; gap: 20px; }
        
        .color-selector { display: flex; gap: 10px; }
        .color-btn { 
            padding: 10px 15px; border: 2px solid #333; cursor: pointer; 
            opacity: 0.3; font-weight: bold; transition: 0.2s;
        }
        .color-btn.active { opacity: 1; border-color: #fff; }

        #engage-btn { 
            background: #0f0; color: #000; padding: 10px 20px; 
            font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer;
        }

        #ad-container { 
            width: 100%; min-height: 100px; border: 1px dashed #333; 
            display: flex; align-items: center; justify-content: center; 
            color: #444; font-size: 12px; margin-top: auto;
        }

        .screensaver-mode #menu-ui { display: none; }
        .screensaver-mode #matrix-canvas { flex: 0 0 100vh; }
    </style>
</head>
<body id="app-body">

<div id="app-container">
    <canvas id="matrix-canvas"></canvas>
    <div id="menu-ui">
        <div class="control-row">
            <div class="color-selector">
                <div class="color-btn active" data-color="#0f0" style="background:#0f0; color:#000;">G</div>
                <div class="color-btn active" data-color="#00f2ff" style="background:#00f2ff; color:#000;">B</div>
                <div class="color-btn active" data-color="#ff0000" style="background:#ff0000; color:#000;">R</div>
            </div>
            <div id="engage-btn">Full Animation</div>
        </div>
        <div id="ad-container">ADVERTISEMENT SPACE</div>
    </div>
</div>

<script>
    // PWA Service Worker Registration
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
            .then(() => console.log('Service Worker Registered'));
    }

    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    const body = document.getElementById('app-body');
    const engageBtn = document.getElementById('engage-btn');

    let activeColors = ['#0f0', '#00f2ff', '#ff0000'];
    const chars = '0123456789!@#$%^&*()_+-=[]{}|;:,.<>?/ァアィイゥウェエォオカガキギクグケゲコゴサザシジスズセゼソゾタダチヂッツヅテデトドナニヌネノハバパヒビピフブプヘベペホボポマミムメモャヤュユョヨラリルレロヮワヰヱヲンヴヵヶ'.split('');
    const fov = 350;
    const maxZ = 2000;
    let streams = [];

    document.querySelectorAll('.color-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const color = btn.dataset.color;
            if (activeColors.includes(color)) {
                if (activeColors.length > 1) {
                    activeColors = activeColors.filter(c => c !== color);
                    btn.classList.remove('active');
                }
            } else {
                activeColors.push(color);
                btn.classList.add('active');
            }
        });
    });

    class Stream {
        constructor() { this.reset(true); }
        reset(randomizeZ) {
            this.z = randomizeZ ? Math.random() * maxZ + 10 : maxZ;
            let angle = Math.random() * Math.PI * 2;
            let radius = Math.random() * 1000 + 200;
            this.x = Math.cos(angle) * radius;
            this.y = -500;
            this.speedY = Math.random() * 4 + 2;
            this.speedZ = Math.random() * 4 + 2;
            this.length = Math.floor(Math.random() * 10 + 5);
            this.charsArr = Array(this.length).fill('');
            this.updateChars();
            this.color = activeColors[Math.floor(Math.random() * activeColors.length)];
        }
        updateChars() {
            for(let i=0; i<this.length; i++) this.charsArr[i] = chars[Math.floor(Math.random() * chars.length)];
        }
        draw() {
            this.y += this.speedY;
            this.z -= this.speedZ;
            if (Math.random() > 0.95) this.updateChars();
            if (this.y > 2000) this.y = -500;
            if (this.z < 10) { 
                this.reset(false); 
                this.color = activeColors[Math.floor(Math.random() * activeColors.length)]; 
            }
            
            let scale = fov / this.z;
            let screenX = this.x * scale + canvas.width / 2;
            let fontSize = 20 * scale;
            
            ctx.font = `bold ${fontSize}px 'Courier New', monospace`;
            for (let i = 0; i < this.length; i++) {
                let charY = this.y - (i * 35); 
                let screenY = charY * scale + canvas.height / 2;
                let alpha = (1 - (i / this.length)) * (1 - (this.z / maxZ));
                ctx.globalAlpha = Math.max(0, alpha);
                ctx.fillStyle = (i === 0) ? '#FFF' : this.color;
                ctx.fillText(this.charsArr[i], screenX, screenY);
            }
        }
    }

    engageBtn.addEventListener('click', () => {
        body.classList.add('screensaver-mode');
        resize();
        if (canvas.requestFullscreen) canvas.requestFullscreen();
    });

    document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement) {
            body.classList.remove('screensaver-mode');
            resize();
        }
    });

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = body.classList.contains('screensaver-mode') ? window.innerHeight : window.innerHeight / 2;
    }

    function loop() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        streams.forEach(s => s.draw());
        ctx.globalAlpha = 1.0;
        requestAnimationFrame(loop);
    }

    streams = Array.from({length: 150}, () => new Stream());
    window.addEventListener('resize', resize);
    resize();
    loop();
</script>
</body>
</html>
